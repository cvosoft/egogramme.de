<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Egogramm Test</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: #f8fafc;
        }

        .answer-btn.active {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
            transform: scale(1.05);
        }
    </style>
</head>

<body class="min-h-screen text-slate-800">

    <!-- Header -->
    <header class="border-b border-slate-200 bg-white">
        <div class="mx-auto flex max-w-4xl items-center justify-between px-6 py-4">
            <a href="/" class="text-xl font-bold tracking-tight">
                egogramme.de
            </a>

            <div class="text-sm text-slate-500">
                Persönlichkeits-Test
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="flex min-h-[calc(100vh-73px)] items-center justify-center px-6 py-12">

        <div class="w-full max-w-3xl">

            <!-- Progress -->
            <div class="mb-10">

                <div class="mb-3 flex items-center justify-between text-sm font-medium text-slate-500">
                    <span id="progressText">Frage 1 von 60</span>
                    <span id="progressPercent">2%</span>
                </div>

                <div class="h-3 overflow-hidden rounded-full bg-slate-200">
                    <div id="progressBar" class="h-full rounded-full bg-indigo-600 transition-all duration-300"
                        style="width: 2%"></div>
                </div>

            </div>

            <!-- Question Card -->
            <div class="rounded-[2rem] border border-slate-200 bg-white p-8 shadow-sm lg:p-12">

                <div class="mb-6 text-sm font-semibold uppercase tracking-wider text-indigo-600">
                    Aussage
                </div>

                <h1 id="questionText"
                    class="text-3xl font-black leading-tight tracking-tight text-slate-900 lg:text-4xl">
                    Ich bin stets offen für Neues.
                </h1>

                <!-- Scale -->
                <div class="mt-12">

                    <div class="mb-4 flex items-center justify-between text-sm text-slate-500">
                        <span>trifft nicht zu</span>
                        <span>trifft voll zu</span>
                    </div>

                    <div class="grid grid-cols-5 gap-3">

                        <button
                            class="answer-btn rounded-2xl border border-slate-300 bg-white py-5 text-xl font-bold transition hover:border-indigo-400 hover:bg-indigo-50"
                            data-value="1">
                            1
                        </button>

                        <button
                            class="answer-btn rounded-2xl border border-slate-300 bg-white py-5 text-xl font-bold transition hover:border-indigo-400 hover:bg-indigo-50"
                            data-value="2">
                            2
                        </button>

                        <button
                            class="answer-btn rounded-2xl border border-slate-300 bg-white py-5 text-xl font-bold transition hover:border-indigo-400 hover:bg-indigo-50"
                            data-value="3">
                            3
                        </button>

                        <button
                            class="answer-btn rounded-2xl border border-slate-300 bg-white py-5 text-xl font-bold transition hover:border-indigo-400 hover:bg-indigo-50"
                            data-value="4">
                            4
                        </button>

                        <button
                            class="answer-btn rounded-2xl border border-slate-300 bg-white py-5 text-xl font-bold transition hover:border-indigo-400 hover:bg-indigo-50"
                            data-value="5">
                            5
                        </button>

                    </div>

                </div>

                <!-- Navigation -->
                <div class="mt-12 flex items-center justify-between">

                    <button id="prevBtn"
                        class="rounded-2xl border border-slate-300 bg-white px-6 py-3 font-semibold text-slate-700 transition hover:bg-slate-50">
                        Zurück
                    </button>

                    <button id="nextBtn"
                        class="rounded-2xl bg-indigo-600 px-8 py-3 font-semibold text-white transition hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-50"
                        disabled>
                        Weiter
                    </button>

                </div>

            </div>

        </div>

    </main>

    <script type="module">

        import { questions } from './questions.js'

        let currentQuestion = 0

        const answers = JSON.parse(localStorage.getItem('egogramAnswers')) || {}

        const questionText = document.getElementById('questionText')
        const progressText = document.getElementById('progressText')
        const progressPercent = document.getElementById('progressPercent')
        const progressBar = document.getElementById('progressBar')

        const prevBtn = document.getElementById('prevBtn')
        const nextBtn = document.getElementById('nextBtn')

        const answerButtons = document.querySelectorAll('.answer-btn')

        function renderQuestion() {

            const question = questions[currentQuestion]

            questionText.textContent = question.text

            const progress = ((currentQuestion + 1) / questions.length) * 100

            progressText.textContent = `Frage ${currentQuestion + 1} von ${questions.length}`

            progressPercent.textContent = `${Math.round(progress)}%`

            progressBar.style.width = `${progress}%`

            prevBtn.disabled = currentQuestion === 0

            answerButtons.forEach(button => {
                button.classList.remove('active')

                const value = Number(button.dataset.value)

                if (answers[question.id] === value) {
                    button.classList.add('active')
                }
            })

            nextBtn.disabled = !answers[question.id]

            if (currentQuestion === questions.length - 1) {
                nextBtn.textContent = 'Ergebnis anzeigen'
            } else {
                nextBtn.textContent = 'Weiter'
            }
        }

        answerButtons.forEach(button => {

            button.addEventListener('click', () => {

                const value = Number(button.dataset.value)

                const question = questions[currentQuestion]

                answers[question.id] = value

                localStorage.setItem(
                    'egogramAnswers',
                    JSON.stringify(answers)
                )

                answerButtons.forEach(btn => {
                    btn.classList.remove('active')
                })

                button.classList.add('active')

                nextBtn.disabled = false

            })

        })

        nextBtn.addEventListener('click', () => {

            if (currentQuestion < questions.length - 1) {

                currentQuestion++

                renderQuestion()

            } else {

                window.location.href = '/result.html'

            }

        })

        prevBtn.addEventListener('click', () => {

            if (currentQuestion > 0) {

                currentQuestion--

                renderQuestion()

            }

        })

        renderQuestion()

    </script>

</body>

</html>
