<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dein Egogramm Ergebnis</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">

    <style>
        body {
            background: #f8fafc;
        }
    </style>
</head>

<body class="min-h-screen text-slate-800">

    <!-- Header -->
    <header class="border-b border-slate-200 bg-white">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">

            <a href="/" class="text-xl font-bold tracking-tight">
                egogramme.de
            </a>

            <a href="/test.html"
                class="rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold transition hover:bg-slate-50">
                Test erneut starten
            </a>

        </div>
    </header>

    <!-- Main -->
    <main class="px-6 py-16">

        <div class="mx-auto max-w-5xl">

            <!-- Hero -->
            <div class="text-center">

                <div class="mb-4 text-sm font-semibold uppercase tracking-wider text-indigo-600">
                    Dein Ergebnis
                </div>

                <h1 class="text-5xl font-black tracking-tight text-slate-900">
                    Dein Egogramm
                </h1>

                <p class="mx-auto mt-6 max-w-2xl text-lg leading-8 text-slate-600">
                    Die Grafik zeigt die Ausprägung deiner sechs Persönlichkeitsfunktionen
                    auf einer Skala von 10 bis 50 Punkten.
                </p>

            </div>

            <!-- Chart Card -->
            <div class="mt-14 rounded-[2rem] border border-slate-200 bg-white p-6 shadow-sm lg:p-10">

                <canvas id="resultChart"></canvas>

            </div>

            <!-- Score Cards -->
            <div id="scoreCards" class="mt-10 grid gap-4 md:grid-cols-2 xl:grid-cols-3"></div>

            <!-- CTA -->
            <div class="mt-16 text-center">

                <a href="/test.html" onclick="localStorage.removeItem('egogramAnswers')"
                    class="inline-flex rounded-2xl bg-indigo-600 px-8 py-4 text-lg font-semibold text-white transition hover:bg-indigo-700">
                    Test erneut durchführen
                </a>

            </div>

        </div>

    </main>

    <script type="module">

        import { questions } from './questions.js'

        const answers =
            JSON.parse(localStorage.getItem('egogramAnswers')) || {}

        const categoryLabels = {
            FE: 'Fürsorgliches Eltern-Ich',
            KE: 'Kritisches Eltern-Ich',
            ER: 'Erwachsenen-Ich',
            FK: 'Freies Kind',
            AK: 'Angepasstes Kind',
            RK: 'Rebellisches Kind',
        }

        const scores = {
            FE: 0,
            KE: 0,
            ER: 0,
            FK: 0,
            AK: 0,
            RK: 0,
        }

        // Scores berechnen
        questions.forEach(question => {

            const value = answers[question.id] || 0

            scores[question.category] += value

        })

        // Chart
        const ctx = document
            .getElementById('resultChart')
            .getContext('2d')

        new Chart(ctx, {
            type: 'bar',

            data: {
                labels: [
                    'fEL',
                    'kEL',
                    'ER',
                    'fK',
                    'aK',
                    'rK'
                ],

                datasets: [{
                    label: 'Punkte',

                    data: [
                        scores.FE,
                        scores.KE,
                        scores.ER,
                        scores.FK,
                        scores.AK,
                        scores.RK
                    ],

                    backgroundColor: [
                        '#6366f1',
                        '#0f766e',
                        '#14b8a6',
                        '#8b5cf6',
                        '#f59e0b',
                        '#ef4444'
                    ],

                    borderRadius: 12
                }]
            },

            options: {

                responsive: true,

                plugins: {
                    legend: {
                        display: false
                    }
                },

                scales: {

                    y: {
                        min: 10,
                        max: 50,

                        ticks: {
                            stepSize: 5
                        },

                        grid: {
                            color: '#e2e8f0'
                        }
                    },

                    x: {
                        grid: {
                            display: false
                        }
                    }

                }

            }

        })

        // Score Cards
        const scoreCards = document.getElementById('scoreCards')

        Object.entries(scores).forEach(([key, value]) => {

            const card = document.createElement('div')

            card.className =
                'rounded-3xl border border-slate-200 bg-white p-6 shadow-sm'

            card.innerHTML = `
        <div class="text-sm font-semibold uppercase tracking-wider text-indigo-600">
          ${categoryLabels[key]}
        </div>

        <div class="mt-3 text-2xl font-black text-slate-900">
          ${value} Punkte
        </div>

        <!--<div class="mt-2 text-slate-600">
          ${categoryLabels[key]}
        </div> -->
      `

            scoreCards.appendChild(card)

        })

    </script>

</body>

</html>
